spring:
  application:
    name: ritomer-backend
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  observations:
    key-values:
      application: ${spring.application.name}

ritomer:
  security:
    jwt:
      hmac-secret: ${RITOMER_SECURITY_JWT_HMAC_SECRET}
  ai:
    mapping-suggestions:
      enabled: ${RITOMER_AI_MAPPING_SUGGESTIONS_ENABLED:false}
  workpapers:
    documents:
      storage:
        backend: ${RITOMER_WORKPAPERS_DOCUMENTS_STORAGE_BACKEND:LOCAL_FS}
        local-root: ${RITOMER_WORKPAPERS_DOCUMENTS_STORAGE_LOCAL_ROOT:${java.io.tmpdir}/ritomer-documents}
        gcs:
          bucket: ${RITOMER_WORKPAPERS_DOCUMENTS_STORAGE_GCS_BUCKET:}

logging:
  pattern:
    level: "%5p [tenant:%X{tenant_id:-na}]"
