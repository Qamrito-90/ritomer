openapi: 3.1.1
info:
  title: Manual Mapping API
  version: 0.1.0
paths:
  /api/closing-folders/{closingFolderId}/mappings/manual:
    get:
      operationId: getManualMappings
      summary: Return the current manual mapping projection for a closing folder
      description: >
        Returns the current tenant-scoped manual mapping projection using the published V2 taxonomy
        from `contracts/reference/manual-mapping-targets-v2.yaml`, while preserving coexistence with
        legacy V1 codes from `contracts/reference/manual-mapping-targets-v1.yaml`.
      parameters:
        - in: header
          name: X-Tenant-Id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: closingFolderId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Mapping projection returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualMappingProjection"
        "400":
          description: Missing, blank or malformed X-Tenant-Id
        "401":
          description: Authentication required
        "403":
          description: Tenant inaccessible or role insufficient
        "404":
          description: Closing folder absent or outside tenant
    put:
      operationId: upsertManualMapping
      summary: Create or update a manual mapping for a closing folder
      description: >
        The write contract remains based on `targetCode`. Selectable legacy V1 codes and selectable
        V2 leaf codes coexist; non-selectable summary or section codes from
        `contracts/reference/manual-mapping-targets-v2.yaml` are rejected.
      parameters:
        - in: header
          name: X-Tenant-Id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: closingFolderId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualMappingUpsertRequest"
      responses:
        "201":
          description: Mapping created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualMappingEntry"
        "200":
          description: Mapping updated or unchanged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualMappingEntry"
        "400":
          description: Invalid payload, unknown accountCode in latest import, unknown targetCode, or non-selectable targetCode
        "401":
          description: Authentication required
        "403":
          description: Tenant inaccessible or role insufficient
        "404":
          description: Closing folder absent or outside tenant
        "409":
          description: Closing folder archived or no balance import available
    delete:
      operationId: deleteManualMapping
      summary: Delete a manual mapping for a closing folder
      parameters:
        - in: header
          name: X-Tenant-Id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: closingFolderId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: accountCode
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "204":
          description: Mapping deleted or already absent
        "400":
          description: accountCode is missing or blank
        "401":
          description: Authentication required
        "403":
          description: Tenant inaccessible or role insufficient
        "404":
          description: Closing folder absent or outside tenant
        "409":
          description: Closing folder archived or no balance import available
components:
  schemas:
    ManualMappingProjection:
      type: object
      description: >
        Projection derived from the current mapping taxonomy. `taxonomyVersion` refers to the active
        published taxonomy in `contracts/reference/manual-mapping-targets-v2.yaml`, with legacy V1
        code coexistence preserved for backward compatibility.
      required: [closingFolderId, taxonomyVersion, targets, lines, mappings, summary]
      properties:
        closingFolderId: { type: string, format: uuid }
        taxonomyVersion:
          type: integer
          minimum: 1
        latestImportVersion:
          type: [integer, "null"]
          minimum: 1
        targets:
          type: array
          items:
            $ref: "#/components/schemas/ManualMappingTarget"
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ManualMappingLine"
        mappings:
          type: array
          items:
            $ref: "#/components/schemas/ManualMappingEntry"
        summary:
          $ref: "#/components/schemas/ManualMappingSummary"
    ManualMappingTarget:
      type: object
      description: >
        Mapping target published by the active V2 taxonomy in
        `contracts/reference/manual-mapping-targets-v2.yaml`. Legacy V1 targets remain present as
        deprecated selectable targets for coexistence compatibility.
      required:
        [code, label, statement, summaryBucketCode, sectionCode, normalSide, granularity, deprecated, selectable, displayOrder]
      properties:
        code: { type: string }
        label: { type: string }
        statement:
          type: string
          enum: [BALANCE_SHEET, INCOME_STATEMENT]
        summaryBucketCode: { type: string }
        sectionCode: { type: string }
        normalSide:
          type: string
          enum: [DEBIT, CREDIT]
        granularity:
          type: string
          enum: [LEAF, SECTION]
        deprecated: { type: boolean }
        selectable: { type: boolean }
        displayOrder:
          type: integer
          minimum: 0
    ManualMappingLine:
      type: object
      required: [accountCode, accountLabel, debit, credit]
      properties:
        accountCode: { type: string }
        accountLabel: { type: string }
        debit: { type: string }
        credit: { type: string }
    ManualMappingEntry:
      type: object
      required: [accountCode, targetCode]
      properties:
        accountCode: { type: string }
        targetCode: { type: string }
    ManualMappingSummary:
      type: object
      required: [total, mapped, unmapped]
      properties:
        total: { type: integer, minimum: 0 }
        mapped: { type: integer, minimum: 0 }
        unmapped: { type: integer, minimum: 0 }
    ManualMappingUpsertRequest:
      type: object
      additionalProperties: false
      required: [accountCode, targetCode]
      properties:
        accountCode: { type: string }
        targetCode: { type: string }
